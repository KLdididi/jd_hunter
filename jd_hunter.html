<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>JD Hunter v2.3 - BOSS直聘职位追踪器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1e293b;--green:#10b981;--cyan:#06b6d4;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:rgba(255,255,255,0.08)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.3rem;font-weight:800;background:linear-gradient(90deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ver{font-size:.65rem;color:var(--green);border:1px solid var(--green);padding:1px 5px;border-radius:3px;margin-left:.5rem}
.topbar-r{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.dot.live{background:var(--green);animation:pulse 2s infinite}
.dot.crawl{background:var(--amber);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:1rem 1.5rem;max-width:1600px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:.5rem;margin-bottom:.8rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.6rem;text-align:center}
.sn{font-size:1.3rem;font-weight:800;color:var(--green)}
.sl{font-size:.6rem;color:var(--text3);margin-top:.1rem}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;margin-bottom:.7rem}
.panel-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.city-grid{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.city-btn{padding:.22rem .65rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.7rem;cursor:pointer;transition:.15s;user-select:none}
.city-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.city-btn.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.city-btn.on:hover{background:#059669}
.row{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-top:.6rem}
.row:first-child{margin-top:0}
.row+.row{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
.btn{padding:.3rem .7rem;border-radius:5px;font-weight:600;cursor:pointer;border:none;font-size:.73rem;transition:.15s;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.bg{background:linear-gradient(135deg,var(--green),#059669);color:#fff}
.bc{background:linear-gradient(135deg,var(--cyan),#0891b2);color:#fff}
.ba{background:linear-gradient(135deg,var(--amber),#d97706);color:#000}
.br{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff}
.bo{background:transparent;border:1px solid var(--border);color:var(--text2)}
.bo:hover{border-color:var(--cyan);color:var(--cyan)}
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.28rem .5rem;border-radius:4px;font-size:.75rem}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--green)}
.lbl{display:flex;align-items:center;gap:.3rem;font-size:.73rem;color:var(--text2);cursor:pointer;user-select:none}
tr.detail-row{display:table-row}
tr.detail-row td{padding:.4rem .5rem .5rem 2.5rem;background:rgba(6,182,212,.03);border-top:none}
.desc-label{font-size:.58rem;color:var(--cyan);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.2rem}
.desc-text{font-size:.7rem;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:80px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.4rem .6rem}
.desc-empty{font-size:.7rem;color:var(--text3);font-style:italic}
.ci-label{font-size:.58rem;color:var(--purple);text-transform:uppercase;letter-spacing:.4px;margin:.4rem 0 .2rem}
.ci-text{font-size:.7rem;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:80px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.4rem .6rem}
.ci-empty{font-size:.7rem;color:var(--text3);font-style:italic}
.prog-wrap{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:.5rem .8rem;margin-bottom:.7rem;display:none}
.prog-wrap.on{display:block}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:.25rem 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:2px;transition:width .3s}
.prog-info{font-size:.68rem;color:var(--text3)}
.prog-cur{font-size:.7rem;color:var(--cyan);margin-top:.15rem}
.log-box{background:#000;border:1px solid var(--border);border-radius:5px;padding:.4rem;font-size:.65rem;font-family:monospace;max-height:150px;overflow-y:auto;margin-top:.5rem;white-space:pre-wrap;display:none}
.log-box.on{display:block}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead{background:#0f172a}
th{padding:.35rem .5rem;text-align:left;color:var(--text3);font-size:.6rem;text-transform:uppercase;letter-spacing:.3px}
td{padding:.35rem .5rem;border-top:1px solid var(--border);vertical-align:top;max-width:0}
tr:hover td{background:rgba(16,185,129,.04)}
tr.row-hot td{background:rgba(239,68,68,.05)}
.td-name{font-weight:600;color:var(--green);cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-name:hover{text-decoration:underline}
.td-sal{color:var(--amber);font-weight:700;white-space:nowrap}
.tag{display:inline-block;padding:.05rem .28rem;border-radius:3px;font-size:.58rem;font-weight:500}
.te{background:rgba(6,182,212,.12);color:var(--cyan)}
.td-tag{background:rgba(16,185,129,.12);color:var(--green)}
.tp{background:rgba(139,92,246,.12);color:var(--purple)}
.td-link{text-align:center;white-space:nowrap}
.td-link a{color:var(--cyan);font-size:.85rem;text-decoration:none}
.td-link a:hover{text-decoration:underline}
.td-desc{font-size:.7rem;color:var(--text2);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default}
.td-desc .has{color:var(--green)}
.td-desc .none{color:var(--text3)}
.td-ci{font-size:.7rem;color:var(--purple);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default}
.td-ci .has{color:var(--purple)}
.td-ci .none{color:var(--text3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.mo.sh{opacity:1;pointer-events:all}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:95%;max-width:820px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.95);transition:transform .2s}
.mo.sh .md{transform:scale(1)}
.md-hd{background:linear-gradient(135deg,#0f172a,#1e293b);padding:.9rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.md-hd-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.md-hd-info{flex:1;min-width:0}
.md-hd-title{font-size:1rem;font-weight:700;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.md-hd-sub{display:flex;gap:.6rem;margin-top:.2rem;flex-wrap:wrap}
.md-hd-tag{padding:.1rem .5rem;border-radius:12px;font-size:.65rem;font-weight:600}
.md-hd-sal{color:var(--amber);background:rgba(245,158,11,.15)}
.md-hd-exp{color:var(--cyan);background:rgba(6,182,212,.12)}
.md-hd-edu{color:var(--purple);background:rgba(139,92,246,.12)}
.md-hd-cl{background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer;line-height:1;padding:.2rem;border-radius:5px;flex-shrink:0}
.md-hd-cl:hover{background:rgba(255,255,255,.1);color:var(--text)}
.md-body{padding:.9rem 1.1rem;overflow-y:auto;flex:1}
.md-body::-webkit-scrollbar{width:5px}
.md-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.detail-section{margin-bottom:1.1rem}
.detail-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.detail-label::before{content:'';width:3px;height:12px;background:var(--green);border-radius:2px;display:inline-block}
.detail-content{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;font-size:.8rem;line-height:1.7;color:var(--text2)}
.detail-content.desc-text{max-height:280px;overflow-y:auto}
.detail-content.desc-text p{margin-bottom:.4rem}
.detail-content.desc-text p:last-child{margin-bottom:0}
.detail-link{color:var(--cyan);text-decoration:none;word-break:break-all}
.detail-link:hover{text-decoration:underline}
.detail-empty{color:var(--text3);font-style:italic;font-size:.78rem}
.company-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(139,92,246,.12);color:var(--purple);padding:.2rem .6rem;border-radius:6px;font-size:.72rem}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.35rem .8rem;font-size:.75rem;z-index:600;transition:transform .2s;pointer-events:none}
.toast.sh{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.er{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center">
    <h1>🕷️ JD Hunter</h1>
    <span class="ver">v2.3</span>
  </div>
  <div class="topbar-r">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">就绪</span>
  </div>
</div>

<div class="main">
  <!-- 统计 -->
  <div class="stats">
    <div class="stat"><div class="sn" id="s-tot">0</div><div class="sl">总数</div></div>
    <div class="stat"><div class="sn" style="color:var(--cyan)" id="s-city">0</div><div class="sl">城市</div></div>
    <div class="stat"><div class="sn" style="color:var(--amber)" id="s-rem">0</div><div class="sl">待抓详情</div></div>
    <div class="stat"><div class="sn" style="color:var(--green)" id="s-done">0</div><div class="sl">已抓详情</div></div>
    <div class="stat"><div class="sn" style="color:var(--purple)" id="s-kw">0</div><div class="sl">关键词</div></div>
    <div class="stat"><div class="sn" style="color:var(--red)" id="s-skip">0</div><div class="sl">已过滤</div></div>
  </div>

  <!-- 关键词 -->
  <div class="panel">
    <div class="panel-label">关键词（逗号分隔）</div>
    <input id="iKw" style="width:100%" value="AI应用工程师,AI应用开发,AI Agent工程师,大模型应用工程师,LLM应用工程师,AIGC应用工程师,AI智能体工程师" placeholder="例如: AI工程师,Python开发">
  </div>

  <!-- 城市选择 -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
      <div class="panel-label" style="margin:0">城市选择</div>
      <div style="display:flex;gap:.4rem;font-size:.7rem">
        <button class="btn bo" id="btn-sel-all" style="padding:.2rem .5rem">全选</button>
        <button class="btn bo" id="btn-sel-t1" style="padding:.2rem .5rem">一线</button>
        <button class="btn bo" id="btn-sel-t2" style="padding:.2rem .5rem">二线</button>
        <button class="btn bo" id="btn-sel-none" style="padding:.2rem .5rem">清空</button>
        <span id="cityCount" style="color:var(--text3);padding:.2rem .4rem">0个</span>
      </div>
    </div>
    <div class="city-grid" id="cityGrid"></div>
  </div>

  <!-- 控制栏 -->
  <div class="panel">
    <div class="row">
      <input id="iPages" type="number" value="2" min="1" max="10" style="width:52px">
      <span style="font-size:.7rem;color:var(--text3)">页/城市</span>
      <input id="iPort" value="9222" style="width:52px">
      <span style="flex:1"></span>
      <button class="btn bc" id="btn-launch">🌐 启动浏览器</button>
      <button class="btn ba" id="btn-start">🚀 开始爬取</button>
      <button class="btn br" id="btn-stop" disabled>■ 停止</button>
    </div>
    <div class="row">
      <label class="lbl"><input type="checkbox" id="chkResume" checked> 断点续爬</label>
      <label class="lbl"><input type="checkbox" id="chkDetail" checked> 爬取详情页</label>
      <label class="lbl"><input type="checkbox" id="chkFilter" checked> 经验过滤</label>
      <label class="lbl"><input type="checkbox" id="chkDedup" checked> 自动去重</label>
      <span style="flex:1"></span>
      <button class="btn bo" id="btn-resume">📂 恢复</button>
      <button class="btn bo" id="btn-clear-cp">🗑 清断点</button>
      <button class="btn bg" id="btn-exp-json">📦 JSON</button>
      <button class="btn bo" id="btn-exp-csv">📥 CSV</button>
      <button class="btn bo" id="btn-imp-json">📂 导入JSON</button>
      <button class="btn bo" id="btn-log">📋 日志</button>
      <button class="btn br" id="btn-clear">🗑 清空</button>
    </div>
  </div>

  <!-- 进度 -->
  <div class="prog-wrap" id="progWrap">
    <div style="display:flex;justify-content:space-between;font-size:.7rem">
      <span id="progLabel">⚙️ 爬取中...</span>
      <span id="progCount">0/0</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-info" id="progInfo">-</div>
    <div class="prog-cur" id="progDetail">-</div>
  </div>

  <!-- 日志 -->
  <div class="log-box" id="logBox"></div>

  <!-- 表格 -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:28px">#</th>
          <th>城市</th>
          <th>关键词</th>
          <th>职位名称</th>
          <th>公司</th>
          <th>薪资</th>
          <th>经验</th>
          <th class="td-link">🔗</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="mo" id="modal">
  <div class="md">
    <div class="md-hd">
      <div class="md-hd-icon">💼</div>
      <div class="md-hd-info">
        <div class="md-hd-title" id="modalTitle">职位详情</div>
        <div class="md-hd-sub">
          <span class="md-hd-tag md-hd-sal" id="modalSal">-</span>
          <span class="md-hd-tag md-hd-exp" id="modalExp">-</span>
          <span class="md-hd-tag md-hd-edu" id="modalEdu">-</span>
        </div>
      </div>
      <button class="md-hd-cl" id="modalClose">×</button>
    </div>
    <div class="md-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// === 常量 ===
const SERVER = 'http://127.0.0.1:5188';
const KEY_JOBS = 'jdh_jobs_v23';
const KEY_CP = 'jdh_cp_v23';

const CITY_CODE = {
  '北京':'101010100','上海':'101020100','深圳':'101280600','广州':'101280100',
  '杭州':'101210100','成都':'101090100','武汉':'101200100','南京':'101190100',
  '苏州':'101190400','西安':'101110100','长沙':'101250100','重庆':'101040100',
  '天津':'101030100','郑州':'101180100','东莞':'101281600','厦门':'101230200',
  '大连':'101070200','济南':'101120100','沈阳':'101070100','福州':'101230100',
  '无锡':'101190200','青岛':'101120200','南宁':'101290100','海口':'101310100','合肥':'101220100'
};
const TIER1 = ['北京','上海','深圳','广州'];
const TIER2 = ['杭州','成都','武汉','南京','苏州','厦门','济南','青岛','大连','福州','无锡','合肥'];
const TIER3 = ['西安','长沙','重庆','天津','郑州','东莞','沈阳','南宁','海口'];
const ALL_CITIES = [...TIER1, ...TIER2, ...TIER3];
const SAL_REF = {'t1_0':[12,22],'t1_1':[18,32],'t2_0':[10,18],'t2_1':[14,26],'t3_0':[8,15],'t3_1':[11,22]};
const TOP_COS = ['华为','蚂蚁','海康威视','寒武纪','商汤','小米','传音','中科曙光','长江存储','网易','腾讯','阿里巴巴','字节跳动','百度','京东'];
const ALLOW_EXP = ['无需经验','1-3年','1年以下','在校','应届','实习','经验不限','不限'];

// === 状态 ===
const selectedCities = new Set();
let JOBS = [];
let running = false;
let shouldStop = false;
let skipCount = 0;

// === DOM ===
function $(id) { return document.getElementById(id); }

// === 工具 ===
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function log(msg) {
  const box = $('logBox');
  box.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}
function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast sh ' + (type || '');
  setTimeout(() => t.classList.remove('sh'), 3000);
}
function setStatus(type, txt) {
  $('dot').className = 'dot ' + (type || '');
  $('statusTxt').textContent = txt || '就绪';
}

// === 存储 ===
function saveJobs() {
  try { localStorage.setItem(KEY_JOBS, JSON.stringify(JOBS)); } catch(e) {}
}
function saveCheckpoint(kwIdx, cityIdx, page) {
  try {
    localStorage.setItem(KEY_CP, JSON.stringify({
      kw_idx: kwIdx, city_idx: cityIdx, page: page,
      jobs: JOBS, saved_at: new Date().toLocaleString()
    }));
    log('💾 断点已保存 [' + JOBS.length + '条]');
  } catch(e) {}
}
function getCheckpoint() {
  try { const s = localStorage.getItem(KEY_CP); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function resumeCheckpoint() {
  const cp = getCheckpoint();
  if (!cp) { toast('无断点记录', 'er'); return; }
  JOBS = cp.jobs || [];
  saveJobs();
  render();
  updateStats();
  toast('已恢复断点: ' + cp.saved_at, 'ok');
  log('恢复断点: kw#' + cp.kw_idx + ' city#' + cp.city_idx + ' page' + cp.page);
}
function clearCheckpoint() { localStorage.removeItem(KEY_CP); toast('断点已清除', 'ok'); }

// === 城市选择 ===
function renderCityGrid() {
  const grid = $('cityGrid');
  grid.innerHTML = '';
  ALL_CITIES.forEach(function(city) {
    const btn = document.createElement('button');
    btn.className = 'city-btn' + (selectedCities.has(city) ? ' on' : '');
    btn.textContent = city;
    btn.dataset.city = city;
    btn.addEventListener('click', function() { toggleCity(city, btn); });
    grid.appendChild(btn);
  });
  updateCityCount();
}

function toggleCity(city, btn) {
  if (selectedCities.has(city)) {
    selectedCities.delete(city);
    btn.classList.remove('on');
  } else {
    selectedCities.add(city);
    btn.classList.add('on');
  }
  updateCityCount();
}

function selectAllCities() {
  selectedCities.clear();
  ALL_CITIES.forEach(function(c) { selectedCities.add(c); });
  document.querySelectorAll('.city-btn').forEach(function(b) { b.classList.add('on'); });
  updateCityCount();
}

function selectTier1() {
  TIER1.forEach(function(c) { selectedCities.add(c); });
  document.querySelectorAll('.city-btn').forEach(function(b) {
    if (TIER1.indexOf(b.dataset.city) >= 0) b.classList.add('on');
  });
  updateCityCount();
}

function selectTier2() {
  TIER2.forEach(function(c) { selectedCities.add(c); });
  document.querySelectorAll('.city-btn').forEach(function(b) {
    if (TIER2.indexOf(b.dataset.city) >= 0) b.classList.add('on');
  });
  updateCityCount();
}

function clearAllCities() {
  selectedCities.clear();

// === 浏览器启动 ===

// === CDP ===
async function getTabs() {
  const r = await fetch(SERVER + '/api/tabs');
  return r.json();
}

async function cdp(tabId, method, params) {
  params = params || {};
  const r = await fetch(SERVER + '/api/cdp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tabId: tabId, method: method, params: params })
  });
  if (!r.ok) throw new Error('CDP ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error.message || 'CDP error');
  return data;
}

function estSalary(city, exp, edu, company) {
  var tier = (TIER1.indexOf(city) >= 0) ? 't1' : (TIER2.indexOf(city) >= 0) ? 't2' : 't3';
  var ei = 0;
  if (exp && (exp.indexOf('1-3') >= 0 || exp.indexOf('3-5') >= 0)) ei = 1;
  var ref = SAL_REF[tier + '_' + ei] || [12, 24];
  var lo = ref[0], hi = ref[1];
  if (edu) {
    if (edu.indexOf('硕士') >= 0) { lo = Math.round(lo * 1.15); hi = Math.round(hi * 1.15); }
    else if (edu.indexOf('博士') >= 0) { lo = Math.round(lo * 1.3); hi = Math.round(hi * 1.3); }
  }
  if (company && TOP_COS.some(function(c) { return company.indexOf(c) >= 0; })) {
    lo = Math.round(lo * 1.2); hi = Math.round(hi * 1.25);
  }
  return lo + '-' + hi + 'K';
}

function expAllowed(exp) {
  if (!exp) return true;
  return ALLOW_EXP.some(function(a) { return exp.indexOf(a) >= 0; });
}

function deduplicate(jobs) {
  var seen = {};
  return jobs.filter(function(j) {
    var k = (j.city || '') + '|' + (j.company || '').trim() + '|' + (j.name || '');
    if (seen[k]) return false;
    seen[k] = true;
    return true;
  });
}

async function waitVerify(tabId) {
  log('⚠️ 检测到验证码，请在浏览器中完成（5分钟超时）');
  toast('请完成验证码', 'er');
  var deadline = Date.now() + 300000;
  while (Date.now() < deadline) {
    if (shouldStop) return false;
    try {
      var r = await cdp(tabId, 'Runtime.evaluate', { expression: 'location.href', returnByValue: true });
      var url = (r.result && r.result.result && r.result.result.value) || '';
      if (url.indexOf('verify') < 0 && url.indexOf('passport') < 0) {
        log('✅ 验证通过');
        await sleep(2000);
        return true;
      }
    } catch(e) {}
    await sleep(3000);
  }
  log('⏰ 验证超时');
  return false;
}

async function crawlDetail(tabId, job) {
  if (!job.link) return;
  try {
    await cdp(tabId, 'Page.navigate', { url: job.link });
    await sleep(4500);
    var rc = await cdp(tabId, 'Runtime.evaluate', { expression: 'location.href', returnByValue: true });
    var cu = (rc.result && rc.result.result && rc.result.result.value) || '';
    if (cu.indexOf('verify') >= 0 || cu.indexOf('passport') >= 0) {
      if (!await waitVerify(tabId)) return;
    }
    await sleep(1500);
    var rd = await cdp(tabId, 'Runtime.evaluate', {
      expression: '(function(){var r={desc:\'\',company_intro:\'\'};var st=document.querySelector(".job-sec-text");if(st){r.desc=st.textContent.trim();}else{var js=document.querySelector(".job-sec");if(js){var ps=js.querySelectorAll("p");var arr=[];for(var i=0;i<ps.length;i++){var t=ps[i].textContent.trim();if(t)arr.push(t);}r.desc=arr.join("\\n");}}var ci=document.querySelector(".company-info-box");if(ci)r.company_intro=ci.textContent.trim();else{var cs=document.querySelector(".sider-company,.company-sec");if(cs)r.company_intro=cs.textContent.trim();}return JSON.stringify(r);})()',
      returnByValue: true
    });
    var detail = JSON.parse((rd.result && rd.result.result && rd.result.result.value) || '{}');
    if (detail.desc) job.desc = detail.desc;
    if (detail.company_intro) job.company_intro = detail.company_intro;
    log('  ✓ 详情 desc=' + ((job.desc||'').length) + '字 intro=' + ((job.company_intro||'').length) + '字');
  } catch(e) {
    log('  ✗ 详情页: ' + e.message);
  }
  await sleep(2000);
}

async function waitForPageReady(tabId, maxWait) {
  maxWait = maxWait || 15000;
  var deadline = Date.now() + maxWait;
  var lastLen = 0;
  while (Date.now() < deadline) {
    try {
      var r = await cdp(tabId, 'Runtime.evaluate', {
        expression: 'document.querySelectorAll(".job-card-box, .job-list-box li, .job-card, [class*=job-list] li").length',
        returnByValue: true
      });
      var len = (r.result && r.result.result && r.result.result.value) || 0;
      if (len > 0) return true;
      lastLen = len;
    } catch(e) {}
    await sleep(1200);
  }
  return false;
}

function parseSalary(raw) {
  if (!raw) return '';
  var nums = raw.match(/\d+/g);
  if (!nums || nums.length < 2) return '';
  return nums[0] + '-' + nums[1] + 'K';
}

async function crawlList(tabId, keyword, city, cityCode, page) {
  var url = 'https://www.zhipin.com/web/geek/job?query=' + encodeURIComponent(keyword) + '&city=' + cityCode + '&page=' + page;
  log('→ ' + keyword + ' | ' + city + ' | 第' + page + '页');
  await cdp(tabId, 'Page.navigate', { url: url });

  // 检测验证码/登录页
  var rc = await cdp(tabId, 'Runtime.evaluate', { expression: 'location.href', returnByValue: true });
  var cu = (rc.result && rc.result.result && rc.result.result.value) || '';
  if (cu.indexOf('verify') >= 0 || cu.indexOf('passport') >= 0) {
    log('  ⚠️ 需要登录，跳过');
    if (!await waitVerify(tabId)) return [];
  }

  // 等待内容加载，最多15秒
  var loaded = await waitForPageReady(tabId, 15000);
  if (!loaded) log('  ⚠️ 等待超时，仍尝试抓取');
  await sleep(1000);

  // 抓取列表：薪资用私有Unicode码点-57380解码（BOSS用私有字体）
  var r = await cdp(tabId, 'Runtime.evaluate', {
    expression: '(function(){var cards=document.querySelectorAll(".job-card-box");if(!cards.length)return"[]";var res=[];for(var i=0;i<cards.length;i++){var c=cards[i];var nameEl=c.querySelector(".job-name");var salEl=c.querySelector(".job-salary");var tagEl=c.querySelector(".tag-list");var coEl=c.querySelector(".boss-name");var areaEl=c.querySelector(".company-location");var allLinks=c.querySelectorAll("a");var lkEl=null;for(var k=0;k<allLinks.length;k++){var href=allLinks[k].getAttribute("href")||"";if(href.indexOf("job_detail")>=0){lkEl=allLinks[k];break;}}var co=coEl?coEl.textContent.trim():"";if(!co){for(var k2=0;k2<allLinks.length;k2++){var href2=allLinks[k2].getAttribute("href")||"";if(href2.indexOf("gongsi")>=0){co=allLinks[k2].textContent.trim();break;}}}var areaText=areaEl?areaEl.textContent.trim():"";var tags=[];if(tagEl){var tlis=tagEl.querySelectorAll("li");for(var j=0;j<tlis.length;j++){var t=tlis[j].textContent.trim();if(t)tags.push(t);}}var rawSal=salEl?salEl.textContent.trim():"";var salary="";if(rawSal){var realNums=[];for(var ni=0;ni<rawSal.length;ni++){var cp=rawSal.charCodeAt(ni);if(cp>=0xE000&&cp<=0xF8FF)realNums.push(cp-57380);}if(realNums.length>=2){var a=realNums[0],b=realNums[1];if(b<a){var tmp=a;a=b;b=tmp;}salary=a+"-"+b+"K";}else if(realNums.length==1){salary=realNums[0]+"K";}}res.push({name:nameEl?nameEl.textContent.trim():"",salary:salary,tags:tags,company:co,area:areaText,link:lkEl?lkEl.getAttribute("href"):""});}return JSON.stringify(res);})()',
    returnByValue: true
  });
  var raw = JSON.parse((r.result && r.result.result && r.result.result.value) || '[]');
  log('  原始 ' + raw.length + ' 条');
  var doFilter = $('chkFilter').checked;
  var result = [];
  for (var i = 0; i < raw.length; i++) {
    var j = raw[i];
    var exp = '', edu = '';
    for (var t = 0; t < (j.tags||[]).length; t++) {
      var tag = j.tags[t];
      if (/年|应届|在校|实习|不限/.test(tag)) exp = tag;
      else if (/本科|硕士|博士|大专|学历/.test(tag)) edu = tag;
    }
    if (doFilter && !expAllowed(exp)) { skipCount++; continue; }
    var link = j.link || '';
    if (link && link.indexOf('http') !== 0) link = 'https://www.zhipin.com' + link;
    // salary 已在 JS 中用 innerHTML 提取，若为空则回退到估算
    var sal = j.salary || estSalary(city,exp,edu,j.company);
    result.push({ keyword:keyword, city:city, name:j.name, company:j.company,
      salary:sal, exp:exp, edu:edu, link:link, area:j.area, desc:'', company_intro:'' });
  }
  log('  过滤后 ' + result.length + ' 条');
  return result;
}

async function startCrawl() {
  if (running) { toast('已在运行', 'er'); return; }
  var keywords = $('iKw').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  var cities = getSelectedCities();
  var pages = parseInt($('iPages').value) || 2;
  if (!keywords.length) { toast('请输入关键词', 'er'); return; }
  if (!cities.length) { toast('请选择城市', 'er'); return; }
  try {
    await getTabs();
  } catch(e) {
    toast('❌ 无法连接CDP，请先启动浏览器', 'er');
    return;
  }
  var startKi = 0, startCi = 0, startPage = 1;
  if ($('chkResume').checked) {
    var cp = getCheckpoint();
    if (cp && cp.jobs) {
      startKi = cp.kw_idx || 0;
      startCi = cp.city_idx || 0;
      startPage = (cp.page || 0) + 1;
      JOBS = cp.jobs;
      saveJobs();
      render();
      updateStats();
      log('📂 从断点继续');
      toast('从断点继续，已恢复' + JOBS.length + '条', 'ok');
    }
  }
  running = true;
  shouldStop = false;
  skipCount = 0;
  $('btn-start').disabled = true;
  $('btn-stop').disabled = false;
  $('progWrap').classList.add('on');
  setStatus('crawl', '爬取中');
  var total = keywords.length * cities.length * pages;
  var cur = startKi * cities.length * pages + startCi * pages + (startPage - 1);
  try {
    var tabs = await getTabs();
    var tabId = tabs[0] ? tabs[0].id : null;
    var doDetail = $('chkDetail').checked;
    var doDedup = $('chkDedup').checked;
    for (var ki = startKi; ki < keywords.length; ki++) {
      for (var ci = (ki === startKi ? startCi : 0); ci < cities.length; ci++) {
        var city = cities[ci];
        var code = CITY_CODE[city];
        if (!code) { log('未知城市: ' + city); continue; }
        var fromPage = (ki === startKi && ci === startCi) ? startPage : 1;
        for (var p = fromPage; p <= pages; p++) {
          if (shouldStop) throw new Error('STOP');
          cur++;
          var pct = total > 0 ? (cur / total * 100).toFixed(1) : 0;
          $('progFill').style.width = pct + '%';
          $('progCount').textContent = cur + '/' + total;
          $('progInfo').textContent = keywords[ki] + ' | ' + city + ' | 第' + p + '页 | 已过滤:' + skipCount;
          var jobs = await crawlList(tabId, keywords[ki], city, code, p);
          if (jobs.length) {
            if (doDetail) {
              for (var di = 0; di < jobs.length; di++) {
                if (shouldStop) throw new Error('STOP');
                $('progDetail').textContent = '详情 ' + (di + 1) + '/' + jobs.length;
                await crawlDetail(tabId, jobs[di]);
              }
            }
            JOBS.push.apply(JOBS, jobs);
            if (doDedup) { JOBS = deduplicate(JOBS); }
            saveJobs();
            render();
            updateStats();
            saveCheckpoint(ki, ci, p);
          }
          await sleep(2500);
        }
      }
    }
    log('🎉 完成！共' + JOBS.length + '条');
    toast('完成！共' + JOBS.length + '条', 'ok');
  } catch(e) {
    if (e.message === 'STOP') {
      log('⏹ 已停止');
      toast('已停止', 'er');
    } else {
      log('✗ 错误: ' + e.message);
      toast('错误: ' + e.message, 'er');
    }
  }
  running = false;
  shouldStop = false;
  $('btn-start').disabled = false;
  $('btn-stop').disabled = true;
  $('progWrap').classList.remove('on');
  $('progDetail').textContent = '-';
  setStatus('live', '完成');
}

function stopCrawl() { shouldStop = true; toast('停止中...', 'er'); }

// === 表格渲染 ===
function render() {
  var tb = $('tbody');
  if (!JOBS.length) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:var(--text3)">暂无数据，点击「开始爬取」</td></tr>';
    return;
  }
  var html = [];
  var start = Math.max(0, JOBS.length - 200);
  for (var i = JOBS.length - 1; i >= start; i--) {
    var j = JOBS[i];
    var isHot = TOP_COS.some(function(c) { return (j.company||'').indexOf(c) >= 0; });
    var rowClass = isHot ? 'row-hot' : '';
    var num = i + 1;
    var linkHtml = j.link
      ? '<a href="' + esc(j.link) + '" target="_blank" title="打开BOSS直聘">🔗</a>'
      : '<span style="color:var(--text3)">-</span>';
    // 主行
    html.push('<tr class="main-row ' + rowClass + '" data-idx="' + i + '">'
      + '<td style="color:var(--text3)">' + num + '</td>'
      + '<td style="font-size:.72rem">' + esc(j.city) + '</td>'
      + '<td><span class="tag tp" style="font-size:.58rem">' + esc(j.keyword) + '</span></td>'
      + '<td class="td-name">' + esc(j.name) + '</td>'
      + '<td style="color:var(--text2);font-size:.72rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(j.company) + '</td>'
      + '<td class="td-sal" style="white-space:nowrap">' + esc(j.salary) + '</td>'
      + '<td><span class="tag te" style="font-size:.58rem">' + esc(j.exp||'-') + '</span></td>'
      + '<td class="td-link" style="text-align:center;white-space:nowrap">' + linkHtml + '</td>'
      + '</tr>');
    // 展开详情行
    var dRow = '';
    if (j.desc) {
      dRow += '<div class="desc-label">职位描述</div><div class="desc-text">' + esc(j.desc) + '</div>';
    } else {
      dRow += '<div class="desc-label">职位描述</div><div class="desc-empty">无（未爬取）</div>';
    }
    if (j.company_intro) {
      dRow += '<div class="ci-label">公司介绍</div><div class="ci-text">' + esc(j.company_intro) + '</div>';
    } else {
      dRow += '<div class="ci-label">公司介绍</div><div class="ci-empty">无（未爬取）</div>';
    }
    html.push('<tr class="detail-row shown" id="dr' + i + '"><td colspan="8" style="padding:.4rem .5rem .6rem 2.5rem;background:rgba(6,182,212,.03);border-top:none">' + dRow + '</td></tr>');
  }
  tb.innerHTML = html.join('');
}

function updateStats() {
  $('s-tot').textContent = JOBS.length;
  var citySet = {};
  for (var i = 0; i < JOBS.length; i++) { if (JOBS[i].city) citySet[JOBS[i].city] = true; }
  $('s-city').textContent = Object.keys(citySet).length;
  var rem = 0, done = 0;
  for (var i = 0; i < JOBS.length; i++) {
    if (JOBS[i].desc || JOBS[i].company_intro) done++;
    else rem++;
  }
  $('s-rem').textContent = rem;
  $('s-done').textContent = done;
  var kwSet = {};
  for (var i = 0; i < JOBS.length; i++) { if (JOBS[i].keyword) kwSet[JOBS[i].keyword] = true; }
  $('s-kw').textContent = Object.keys(kwSet).length;
  $('s-skip').textContent = skipCount;
}

    + '<div class="detail-content">';

  $('modalBody').innerHTML = html;
  $('modal').classList.add('sh');

function closeModal() {

}

// === 导入导出 ===
function impJSON() {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.addEventListener('change', function() {
    var f = inp.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.addEventListener('load', function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) { toast('JSON格式错误，期望数组', 'er'); return; }
        var before = JOBS.length;
        var doDedup = $('chkDedup').checked;
        for (var i = 0; i < data.length; i++) JOBS.push(data[i]);
        if (doDedup) { JOBS = deduplicate(JOBS); }
        saveJobs();
        render();
        updateStats();
        var added = JOBS.length - before;
        toast('已导入 ' + added + ' 条（总计' + JOBS.length + '条）', 'ok');
        log('📥 导入JSON: ' + added + '条, 现有' + JOBS.length + '条');
      } catch(e) { toast('导入失败: ' + e.message, 'er'); }
    });
    reader.readAsText(f);
  });
  inp.click();
}

function expJSON() {
  if (!JOBS.length) { toast('无数据', 'er'); return; }
  var data = JOBS.map(function(j) {
    return {
      keyword: j.keyword||'', city: j.city||'', name: j.name||'',
      company: j.company||'', salary: j.salary||'', exp: j.exp||'',
      edu: j.edu||'', link: j.link||'', desc: j.desc||'', company_intro: j.company_intro||''
    };
  });
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'boss_jd_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('已导出 JSON ' + data.length + ' 条', 'ok');
}

function expCSV() {
  if (!JOBS.length) { toast('无数据', 'er'); return; }
  var header = ['keyword','city','name','company','salary','exp','edu','link','desc','company_intro'];
  var rows = [header.join(',')];
  for (var i = 0; i < JOBS.length; i++) {
    var j = JOBS[i];
    var row = header.map(function(k) {
      var v = String(j[k] || '');
      return '"' + v.replace(/"/g, '""') + '"';
    });
    rows.push(row.join(','));
  }
  var blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'boss_jd_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('已导出 CSV ' + JOBS.length + ' 条', 'ok');
}

function clearAll() {
  if (!JOBS.length) { toast('无数据', 'er'); return; }
  if (!confirm('确定清空 ' + JOBS.length + ' 条数据？')) return;
  JOBS = [];
  skipCount = 0;
  saveJobs();
  render();
  updateStats();
  toast('已清空', 'ok');
}

// === 事件绑定 ===
$('btn-launch').addEventListener('click', launchBrowser);
$('btn-start').addEventListener('click', startCrawl);
$('btn-stop').addEventListener('click', stopCrawl);
$('btn-resume').addEventListener('click', resumeCheckpoint);
$('btn-clear-cp').addEventListener('click', clearCheckpoint);
$('btn-exp-json').addEventListener('click', expJSON);
$('btn-exp-csv').addEventListener('click', expCSV);
$('btn-imp-json').addEventListener('click', impJSON);
$('btn-log').addEventListener('click', function() { $('logBox').classList.toggle('on'); });
$('btn-clear').addEventListener('click', clearAll);
$('btn-sel-all').addEventListener('click', selectAllCities);
$('btn-sel-t1').addEventListener('click', selectTier1);
$('btn-sel-t2').addEventListener('click', selectTier2);
$('btn-sel-none').addEventListener('click', clearAllCities);
$('modalClose').addEventListener('click', closeModal);
$('modal').addEventListener('click', function(e) { if (e.target === $('modal')) closeModal(); });

// 点击职位名称或展开图标 展开/收起详情行
$('tbody').addEventListener('click', function(e) {
  var row = e.target.closest('.main-row');
  if (row) {
    var idx = parseInt(row.dataset.idx);
    var dr = document.getElementById('dr' + idx);
    if (dr) {
      if (dr.classList.contains('shown')) {
        dr.classList.remove('shown');
      } else {
        // 收起其他展开行
        document.querySelectorAll('.detail-row.shown').forEach(function(el) { el.classList.remove('shown'); });
        dr.classList.add('shown');
      }
    }
  }
});

// === 初始化 ===
(function init() {
  renderCityGrid();
  selectAllCities();
  try {
    var s = localStorage.getItem(KEY_JOBS);
    if (s) JOBS = JSON.parse(s);
  } catch(e) {}
  render();
  updateStats();
  var cp = getCheckpoint();
  if (cp) log('📂 发现断点: ' + cp.saved_at + ' [' + cp.jobs.length + '条]');
})();
</script>

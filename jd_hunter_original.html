<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Hunter - BOSS直聘职位追踪器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1e293b;--bg4:#334155;
  --green:#10b981;--green2:#059669;--cyan:#06b6d4;--cyan2:#0891b2;
  --purple:#8b5cf6;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ===== 顶部栏 ===== */
.topbar{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border-bottom:1px solid var(--border);
  padding:0 2rem;display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:1rem}
.topbar h1{font-size:1.5rem;font-weight:800;background:linear-gradient(90deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:.75rem;font-size:.82rem;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.status-dot.live{background:var(--green);animation:pulse 2s infinite}
.status-dot.crawl{background:var(--amber);animation:pulse .7s infinite}
.status-dot.error{background:var(--red)}
.status-dot.done{background:var(--cyan)}

/* ===== 主内容 ===== */
.main{padding:1.5rem 2rem;max-width:1600px;margin:0 auto}

/* ===== 统计卡片 ===== */
.stats{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.875rem;
  margin-bottom:1.25rem;
}
.stat{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:1rem;text-align:center;transition:.2s;
}
.stat:hover{border-color:var(--green);box-shadow:0 0 20px rgba(16,185,129,.08)}
.stat-n{font-size:1.8rem;font-weight:800;color:var(--green);font-family:'Courier New',monospace;line-height:1.1}
.stat-n.cyan{color:var(--cyan)}.stat-n.purple{color:var(--purple)}.stat-n.amber{color:var(--amber)}.stat-n.blue{color:var(--blue)}
.stat-l{font-size:.72rem;color:var(--text3);margin-top:.25rem;text-transform:uppercase;letter-spacing:.5px}

/* ===== 控制栏 ===== */
.bar{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:.875rem 1.25rem;display:flex;flex-wrap:wrap;gap:.625rem;align-items:center;
  margin-bottom:1.25rem;
}
.bar-left{display:flex;flex-wrap:wrap;gap:.625rem;align-items:center;flex:1}
.bar-right{display:flex;gap:.5rem;align-items:center}

.cg{display:flex;flex-direction:column;gap:.15rem}
.cg-l{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding-left:.1rem}
input,select{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:.45rem .75rem;border-radius:7px;font-size:.85rem;
  min-width:130px;transition:.2s;
}
input:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(6,182,212,.08)}
input[type=number]{min-width:70px}
input[type=file]{border:none;background:none;min-width:auto;padding:.3rem .5rem}
select{min-width:110px}

/* 按钮 */
.btn{
  padding:.5rem 1.1rem;border-radius:8px;font-weight:600;cursor:pointer;
  border:none;font-size:.82rem;transition:.2s;white-space:nowrap;
}
.btn-g{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.btn-g:hover{box-shadow:0 4px 14px rgba(16,185,129,.4);transform:translateY(-1px)}
.btn-c{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#fff}
.btn-c:hover{box-shadow:0 4px 14px rgba(6,182,212,.4);transform:translateY(-1px)}
.btn-a{background:linear-gradient(135deg,var(--amber),#d97706);color:#000}
.btn-a:hover{box-shadow:0 4px 14px rgba(245,158,11,.4)}
.btn-r{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff}
.btn-r:hover{box-shadow:0 4px 14px rgba(239,68,68,.4)}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-o:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-p{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.btn-p:hover{box-shadow:0 4px 14px rgba(139,92,246,.4);transform:translateY(-1px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* ===== 爬取进度 ===== */
.prog{
  background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:14px;
  padding:1rem 1.5rem;margin-bottom:1.25rem;display:none;
}
.prog.on{display:block}
.prog-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.prog-hl{display:flex;align-items:center;gap:.5rem;font-weight:600;color:var(--amber);font-size:.9rem}
.prog-hi{display:flex;gap:1rem;font-size:.78rem;color:var(--text2)}
.prog-bar{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:.5rem}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:4px;transition:width .4s}
.prog-info{display:flex;flex-wrap:wrap;gap:.4rem 1.5rem;font-size:.8rem;color:var(--text2)}
.cj{color:var(--cyan);font-weight:600;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== 表格 ===== */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:#0f172a}
th{
  padding:.65rem .9rem;text-align:left;color:var(--text3);font-weight:600;
  font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;
  cursor:pointer;user-select:none;
}
th:hover{color:var(--text)}
td{padding:.65rem .9rem;border-top:1px solid var(--border);vertical-align:top}
tbody tr{transition:.12s}
tbody tr:hover{background:rgba(16,185,129,.03)}
tbody tr.hi{background:rgba(245,158,11,.05)}

.t-title{font-weight:600;color:var(--green);max-width:200px}
.t-title span{display:block;font-size:.75rem;color:var(--text3);font-weight:400}
.t-co{color:var(--text2);max-width:120px;font-size:.82rem}
.t-sal{color:var(--amber);font-weight:700;font-family:'Courier New',monospace;white-space:nowrap;font-size:.88rem}
.t-meta{display:flex;flex-wrap:wrap;gap:.25rem}
.badge{
  padding:.12rem .5rem;border-radius:4px;font-size:.68rem;font-weight:500;white-space:nowrap;
}
.bc{background:rgba(6,182,212,.12);color:var(--cyan)}
.be{background:rgba(139,92,246,.12);color:var(--purple)}
.bd{background:rgba(16,185,129,.12);color:var(--green)}
.bx{background:rgba(16,185,129,.08);color:var(--green);cursor:pointer}
.bx:hover{background:rgba(16,185,129,.18)}
.t-loc{color:var(--text2);font-size:.8rem;max-width:120px}
.t-st{font-size:.78rem}
.sd{color:var(--green);font-weight:600}
.se{color:var(--text3)}
.sc{color:var(--amber);animation:pulse 1s infinite}
.t-act a{color:var(--cyan);font-size:.78rem;text-decoration:none}
.t-act a:hover{text-decoration:underline}
.t-act span{cursor:pointer;margin-left:.5rem;color:var(--text3);font-size:.8rem}
.t-act span:hover{color:var(--cyan)}
.chk{width:36px}

/* 分页 */
.pg{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.875rem;border-top:1px solid var(--border);
}
.pg-btn{
  padding:.35rem .8rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text2);cursor:pointer;font-size:.82rem;transition:.15s;
}
.pg-btn:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.pg-btn.on{background:var(--cyan);color:#000;border-color:var(--cyan)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-num{font-size:.78rem;color:var(--text3);padding:0 .5rem}

/* ===== 空状态 ===== */
.empty{text-align:center;padding:4rem 2rem}
.ei{font-size:3rem;opacity:.25;margin-bottom:.75rem}
.empty h3{font-size:1rem;color:var(--text2);margin-bottom:.4rem}
.empty p{font-size:.85rem;color:var(--text3)}

/* ===== 模态框 ===== */
.mo{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:.2s;
}
.mo.sh{opacity:1;pointer-events:all}
.mo.sh .md{transform:scale(1)}
.md{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:860px;max-height:88vh;overflow:auto;
  transform:scale(.95);transition:.2s;
}
.mo-hd{
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;
  background:var(--bg2);z-index:1;
}
.mo-hd h2{font-size:1.05rem;color:var(--green);font-weight:700}
.mo-cl{background:none;border:none;color:var(--text2);font-size:1.8rem;cursor:pointer;line-height:1;padding:.1rem .4rem}
.mo-cl:hover{color:var(--text)}
.mo-bd{padding:1.25rem 1.5rem}
.mo-f{margin-bottom:1.1rem}
.mo-fl{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:.35rem}
.mo-fv{
  background:var(--bg3);border-radius:8px;padding:.875rem 1rem;
  font-size:.85rem;color:var(--text2);white-space:pre-wrap;word-break:break-all;
  max-height:180px;overflow:auto;line-height:1.6;
}
.mo-link a{color:var(--cyan);word-break:break-all}

/* ===== 提示 ===== */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:.6rem 1.4rem;font-size:.85rem;z-index:300;
  transition:transform .3s cubic-bezier(.22,.68,0,1.2);pointer-events:none;
}
.toast.sh{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.er{border-color:var(--red);color:var(--red)}
.toast.if{border-color:var(--cyan);color:var(--cyan)}

/* 动画 */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* CSV导入区 */
.drop{
  border:2px dashed var(--border2);border-radius:12px;padding:1.5rem;text-align:center;
  cursor:pointer;transition:.2s;margin-bottom:1.25rem;
}
.drop:hover,.drop.dg{border-color:var(--cyan);background:rgba(6,182,212,.04)}
.drop p{font-size:.88rem;color:var(--text3)}
.drop p span{color:var(--cyan)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>🕷️ JD Hunter <span id="verTag" style="font-size:.65rem;background:var(--bg4);padding:2px 6px;border-radius:4px;margin-left:8px">v...</span></h1>
    <span style="font-size:.8rem;color:var(--text3)">BOSS直聘 · AI职位追踪器</span>
  </div>
  <div class="topbar-right">
    <div class="status-dot" id="dot"></div>
    <span id="status">就绪</span>
  </div>
</div>

<div class="main">

  <!-- 统计 -->
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-n" id="s-tot">0</div><div class="stat-l">职位总数</div></div>
    <div class="stat"><div class="stat-n cyan" id="s-city">0</div><div class="stat-l">城市数</div></div>
    <div class="stat"><div class="stat-n purple" id="s-sal">-</div><div class="stat-l">薪资中位数</div></div>
    <div class="stat"><div class="stat-n" id="s-crawled">0</div><div class="stat-l">已抓详情</div></div>
    <div class="stat"><div class="stat-n amber" id="s-rem">0</div><div class="stat-l">待抓取</div></div>
    <div class="stat"><div class="stat-n blue" id="s-exp">-</div><div class="stat-l">主流经验</div></div>
  </div>

  <!-- 导入区 -->
  <div class="drop" id="dropZone" onclick="document.getElementById('fi').click()">
    <p>📂 <span>点击导入 CSV 文件</span> 或将文件拖拽到此处</p>
    <p style="margin-top:.3rem;font-size:.78rem">支持 .csv / .json，自动识别字段</p>
    <p style="margin-top:.3rem;font-size:.75rem;color:var(--cyan)">💡 提示：首次使用请先在右侧配置GitHub Token</p>
    <input type="file" id="fi" accept=".csv,.json" style="display:none" onchange="doImport(this.files[0])">
  </div>

  <!-- 控制栏 -->
  <div class="bar">
    <div class="bar-left">
      <div class="cg"><div class="cg-l">搜索</div>
        <input type="text" id="srch" placeholder="职位/公司…" oninput="filtr()">
      </div>
      <div class="cg"><div class="cg-l">城市</div>
        <select id="fc" onchange="filtr()"><option value="">全部</option></select>
      </div>
      <div class="cg"><div class="cg-l">经验</div>
        <select id="fe" onchange="filtr()"><option value="">全部</option></select>
      </div>
      <div class="cg"><div class="cg-l">CDP端口</div>
        <input type="number" id="port" value="9222" style="width:70px">
      </div>
      <button class="btn btn-c" id="btnLaunch" onclick="launchEdge()">🌐 启动Edge</button>
    </div>
    <div class="bar-right">
      <button class="btn btn-g" id="btnGo" onclick="startCrawl()">▶ 开始爬取详情</button>
      <button class="btn btn-r" id="btnStop" onclick="stopCrawl()" disabled>■ 停止</button>
      <button class="btn btn-o" onclick="selectDir()">📁 保存目录</button>
      <button class="btn btn-o" onclick="expCSV()">📥 CSV</button>
      <button class="btn btn-o" onclick="expXLS()">📊 Excel</button>
      <button class="btn btn-o" id="btnView" onclick="viewSel()">🔍 查看</button>
      <button class="btn btn-o" onclick="viewAllData()">📋 全部数据</button>
    </div>
  </div>

  <!-- 爬取进度 -->
  <div class="prog" id="prog">
    <div class="prog-h">
      <div class="prog-hl">⚙️ 正在爬取详情页</div>
      <div class="prog-hi">
        <span>错误: <b id="pErr">0</b></span>
        <span>用时: <b id="pTime">0s</b></span>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-info">
      <span>进度: <b id="pPro">0/0</b></span>
      <span>当前: <span class="cj" id="pJob">-</span></span>
    </div>
  </div>

  <!-- 表格 -->
  <div class="tbl">
    <table>
      <thead>
        <tr>
          <th class="chk"><input type="checkbox" id="sa" onchange="togAll()"></th>
          <th onclick="sort('city')">城市</th>
          <th onclick="sort('name')">职位名称</th>
          <th onclick="sort('company')">公司</th>
          <th onclick="sort('salary')">薪资</th>
          <th>经验/学历</th>
          <th>地点</th>
          <th onclick="sort('hasDesc')">详情</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="pg" id="pg"></div>
  </div>
</div>

<!-- 模态框 -->
<div class="mo" id="mo" onclick="if(event.target===this)clMo()">
  <div class="md">
    <div class="mo-hd">
      <h2 id="moTi">职位详情</h2>
      <button class="mo-cl" onclick="clMo()">×</button>
    </div>
    <div class="mo-bd" id="moBd"></div>
  </div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
// ==================== 版本和更新日志 ====================
const APP_VERSION = '1.1.4';  // 代码版本号（统一管理，修改这里自动同步）

// 更新日志
const CHANGELOG = [
  {
    version: '1.1.4',
    date: '2026-04-14',
    notes: [
      'fix: fetch超时保护（AbortController，代理不可用时静默跳过，不卡死页面）',
      'fix: CDP检测5秒超时保护',
      'fix: 移除强制弹窗，改为静默检查',
      'fix: 移除GitHub上传/拉取/发布公告功能，纯本地使用'
    ]
  },
  { version: '1.0.8', date: '2026-04-14', notes: ['修复edge_proxy.js的多个bug', '新增launch_edge.bat启动脚本', '优化CDP代理连接稳定性'] },
  { version: '1.0.7', date: '2026-04-13', notes: ['修复WebSocket代理功能', '新增/ws?target=端点', '修复CORS跨域问题'] },
  { version: '1.0.6', date: '2026-04-13', notes: ['修复path参数支持', '修复Host header泄露', '修复user-data-dir一致性'] },
  { version: '1.0.5', date: '2026-04-13', notes: ['修复自动更新公告功能', '优化版本检测逻辑'] },
  { version: '1.0.4', date: '2026-04-13', notes: ['修复本地版本号未同步问题', '添加调试日志'] },
  { version: '1.0.3', date: '2026-04-13', notes: ['新增「全部数据」按钮', '新增表格抓取状态显示', '新增直接导出全部数据'] },
  { version: '1.0.2', date: '2026-04-13', notes: ['修复数据保存问题', '添加更新日志公告'] },
  { version: '1.0.1', date: '2026-04-13', notes: ['添加自动更新检测功能'] },
  { version: '1.0.0', date: '2026-04-13', notes: ['初始版本发布', '支持BOSS直聘职位详情抓取', '支持CDP连接', '支持CSV/Excel导出'] }
];
let JOBS = [];           // 全部数据
let FLT = [];            // 过滤后
let PAGE = 1;
const PS = 30;
let SC = 'city';
let SD = 'asc';
let ST = {running:false, cur:0, tot:0, err:0, start:0, cdp:null, stop:false, results:[]};
let PT = null;

// ==================== 初始化 ====================
(function(){
  // 动态更新版本标签
  document.getElementById('verTag').textContent = 'v' + APP_VERSION;
  setDot('idle','就绪');
  // 尝试从 localStorage 加载
  try{
    const s = localStorage.getItem('jd_hunter_jobs');
    if(s){ JOBS = JSON.parse(s); buildFlt(); filtr(); updStats(); }
  }catch(e){}
  document.getElementById('srch').addEventListener('input',debounce(filtr,300));
  // 拖放
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('dg'); });
  dz.addEventListener('dragleave', ()=>dz.classList.remove('dg'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('dg'); doImport(e.dataTransfer.files[0]); });
})();

// ==================== 导入 ====================
function doImport(file){
  if(!file){toast('请选择文件','er');return}
  const fd = new FileReader();
  fd.onload = function(ev){
    try{
      const fn = file.name.toLowerCase();
      if(fn.endsWith('.csv')){ parseCSV(ev.target.result); }
      else if(fn.endsWith('.json')){ parseJSON(ev.target.result); }
      else { toast('不支持的格式','er'); return; }
    }catch(e){ toast('解析失败: '+e,'er'); }
  };
  fd.readAsText(file);
}

function parseCSV(txt){
  const jobs = parseCSVRobust(txt);
  if(!jobs.length){toast('CSV解析失败或无有效数据','er');return}
  // 清理空公司/地点
  jobs.forEach(j=>{
    if(!j.company||j.company==='""'||j.company==="''") j.company='';
    if(!j.location||j.location==='""'||j.location==="''") j.location='';
    j.hasDesc = !!(j.duties||j.requirements||j.desc);
  });
  JOBS = jobs;
  save(); buildFlt(); filtr(); updStats();
  toast('成功导入 '+JOBS.length+' 条数据','ok');
}

function parseJSON(txt){
  const d = JSON.parse(txt);
  JOBS = Array.isArray(d) ? d : (d.jobs||[]);
  // 标准化字段
  JOBS = JOBS.map(j=>({
    city:j.city||'',name:j.name||j.title||'',
    company:j.company||'',location:j.location||j.area||'',
    area:j.area||'',exp:j.exp||j.experience||'',
    edu:j.edu||j.education||'',salary:j.salary||'',
    duties:j.duties||j.desc||'',requirements:j.requirements||j.requires||'',
    link:j.link||j.url||'',hasDesc:!!(j.duties||j.desc||j.requirements)
  }));
  if(!JOBS.length){toast('JSON无有效数据','er');return}
  save(); buildFlt(); filtr(); updStats();
  toast('成功导入 '+JOBS.length+' 条条','ok');
}

// CSV行解析（处理引号）
function splitCSV(line){
  const r=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c==','&&!inQ){ r.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  r.push(cur.trim());return r;
}

// BOM感知解析CSV
function parseCSVRobust(txt){
  // 去掉UTF-8 BOM (U+FEFF)
  const clean = txt.replace(/^\uFEFF/,'').replace(/^\ufeff/,'');
  const lines = clean.replace(/\r?\n/g,'\n').split('\n');
  if(lines.length<2) return [];
  // 去掉每个字段头的BOM
  const heads = splitCSV(lines[0]).map(h=>h.replace(/^\uFEFF/,'').replace(/^\ufeff/,''));
  // 辅助：包含中文关键词（忽略BOM）
  const has = (h,k) => h.replace(/\ufeff/gi,'').includes(k);
  const city_i=heads.findIndex(h=>has(h,'城市'));
  const name_i=heads.findIndex(h=>has(h,'职位'));
  const co_i=heads.findIndex(h=>has(h,'公司'));
  const loc_i=heads.findIndex(h=>has(h,'地点'));
  const exp_i=heads.findIndex(h=>has(h,'经验'));
  const edu_i=heads.findIndex(h=>has(h,'学历'));
  const sal_i=heads.findIndex(h=>has(h,'薪资'));
  const dty_i=heads.findIndex(h=>has(h,'职责'));
  const req_i=heads.findIndex(h=>has(h,'要求'));
  const lnk_i=heads.findIndex(h=>has(h,'链接'));

  const jobs = [];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals = splitCSV(lines[i]);
    if(!vals.length) continue;
    const link = lnk_i>=0 ? (vals[lnk_i]||'') : '';
    if(!link && !vals[name_i]) continue;
    jobs.push({
      city: (city_i>=0?vals[city_i]:'')||'',
      name: (name_i>=0?vals[name_i]:'')||'',
      company: (co_i>=0?vals[co_i]:'')||'',
      location: (loc_i>=0?vals[loc_i]:'')||'',
      area: (loc_i>=0?vals[loc_i]:'')||'',
      exp: (exp_i>=0?vals[exp_i]:'')||'',
      edu: (edu_i>=0?vals[edu_i]:'')||'',
      salary: (sal_i>=0?vals[sal_i]:'')||'',
      duties: (dty_i>=0?vals[dty_i]:'')||'',
      requirements: (req_i>=0?vals[req_i]:'')||'',
      link: link,
      hasDesc: !!( (dty_i>=0?vals[dty_i]:'') || (req_i>=0?vals[req_i]:'') )
    });
  }
  return jobs;
}

// ==================== 过滤 & 排序 ====================
function filtr(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const c=document.getElementById('fc').value;
  const e=document.getElementById('fe').value;
  FLT = JOBS.filter(j=>{
    if(q&&!(j.name+' '+j.company+' '+j.city).toLowerCase().includes(q))return false;
    if(c&&j.city!==c)return false;
    if(e&&j.exp!==e)return false;
    return true;
  });
  // 排序
  FLT.sort((a,b)=>{
    let va=a[SC]||'',vb=b[SC]||'';
    if(SC==='hasDesc'){va=(a.duties||a.requirements||'').length;vb=(b.duties||b.requirements||'').length}
    if(SC==='salary'){va=parseSal(a.salary);vb=parseSal(b.salary)}
    if(va<vb)return SD==='asc'?-1:1;
    if(va>vb)return SD==='asc'?1:-1;
    return 0;
  });
  PAGE=1; render();
}

function sort(col){
  if(SC===col){ SD=SD==='asc'?'desc':'asc'; }
  else{ SC=col; SD='asc'; }
  filtr();
}

function buildFlt(){

  document.getElementById('fe').innerHTML='<option value="">全部</option>'+exps.map(e=>`<option value="${e}">${e}</option>`).join('');

// ==================== 统计 ====================
function updStats(){
  const tot=JOBS.length;
  const cityN=[...new Set(JOBS.map(j=>j.city).filter(Boolean))].size;
  const crd=JOBS.filter(j=>j.hasDesc||j.duties||j.requirements||j.desc).length;
  const rem=tot-crd;
  // 薪资中位数
  let sals=JOBS.map(j=>parseSal(j.salary)).filter(s=>s>0).sort((a,b)=>a-b);
  let med='-';
  if(sals.length){const mid=Math.floor(sals.length/2);med=sals.length%2===0?((sals[mid-1]+sals[mid])/2).toFixed(0)+'K':sals[mid]+'K';}
  // 主流经验
  const ec={};JOBS.forEach(j=>{if(j.exp)ec[j.exp]=(ec[j.exp]||0)+1});
  let me='-',mm=0;for(const[k,v]of Object.entries(ec)){if(v>mm){mm=v;me=k;}}
  document.getElementById('s-tot').textContent=tot;
  document.getElementById('s-city').textContent=cityN;
  document.getElementById('s-sal').textContent=med;
  document.getElementById('s-crawled').textContent=crd;
  document.getElementById('s-rem').textContent=rem;
  document.getElementById('s-exp').textContent=me;
}

function parseSal(s){
  if(!s)return 0;
  const m=String(s).match(/(\d+)/g);
  if(!m||m.length<2)return 0;
  return (parseInt(m[0])+parseInt(m[1]))/2;
}

  let h='';
  h+=`<button class="pg-btn" onclick="goP(${PAGE-1})" ${PAGE===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=totP;i++){

  pg.innerHTML=h;
}

async function doCDP(url, jobIdx){
  try {
    // 1. 获取目标tab（5秒超时）
    const ac = new AbortController();
    const to = setTimeout(() => ac.abort(), 5000);
    const tabsR = await fetch('http://localhost:9223/cdp/http?path=/json', { signal: ac.signal });
    clearTimeout(to);
    const tabs = await tabsR.json();
    const tab = tabs.find(t => t.url && t.url.includes('zhipin')) || tabs[0];
    if (!tab) {
      console.error('未找到 zhipin 标签页');
      throw new Error('No tab');
    }

    // 2. 直接连接 WebSocket（Edge 本地允许）
    const wsUrl = tab.webSocketDebuggerUrl;
    const ws = new WebSocket(wsUrl);
    const msgId = { v: 0 };
    const pending = {};
    let connected = false;

    function send(method, params) {
      return new Promise((res, rej) => {
        if (!connected) { rej(new Error('not connected')); return; }
        const id = ++msgId.v;
        pending[id] = res;
        ws.send(JSON.stringify({ id, method, params }));
        setTimeout(() => { if (pending[id]) { delete pending[id]; rej(new Error('timeout')); } }, 25000);
      });
    }

    ws.onmessage = ev => {
      try {
        const d = JSON.parse(ev.data);
        if (d.id && pending[d.id]) {
          const fn = pending[d.id];
          delete pending[d.id];
          fn(d);
        }
      } catch (e) {
        console.error('解析消息失败:', e);
      }
    };

    ws.onerror = (e) => {
      console.error('WebSocket错误');
      ST.stop = true;
    };

    // 等待连接
    await new Promise((res, rej) => {
      ws.onopen = () => { connected = true; res(); };
      ws.onerror = () => { rej(new Error('WebSocket连接失败')) };
      setTimeout(() => { if (!connected) rej(new Error('WebSocket超时')); }, 10000);
    });

    // 3. 开启 Page 域
    await send('Page.enable');
    await sleep(800);

    // 4. 导航到详情页
    await send('Page.navigate', { url });
    await sleep(2000);

    // 5. 等待页面加载完成
    let loaded = false;
    for (let t = 0; t < 20; t++) {
      await sleep(1500);
      try {
        const ur = await send('Runtime.evaluate', { expression: 'document.location.href' });
        const curUrl = ur.result && ur.result.value || '';
        
        // 检测验证码
        if (curUrl.includes('verify') || curUrl.includes('passport') || curUrl.includes('captcha')) {
          toast('检测到验证码，请在浏览器中完成验证…', 'if');
          await sleepFor(() => !ST.stop, 5000);
          continue;
        }
        
        // 检查是否到达详情页
        if (curUrl && (curUrl.includes('job_detail') || curUrl.includes('zhipin.com/web') || curUrl.includes('zhipin.com/mobile'))) {
          loaded = true;
          break;
        }
        
        // 如果 URL 没变化但页面可能有内容，也尝试提取
        if (t > 3 && curUrl === url) {
          loaded = true;
          break;
        }
      } catch (e) {
        if (e.message !== 'timeout') {
          console.error('检查URL失败:', e.message);
        }
      }
    }

    if (!loaded) {
      console.warn('页面未加载成功');
      ws.close();
      return;
    }

    await sleep(2000);

    // 6. 提取数据
    const js = `(function(){
      var r={};
      // 尝试多种选择器
      var d=document.querySelector('.job-detail')||document.querySelector('.job-desc')||
             document.querySelector('.detail-content')||document.querySelector('.job-sec')||
             document.querySelector('.sec-bd')||document.body;
      r.desc=(d.textContent||'').trim().substring(0,3000);
      r.company=(document.querySelector('.company-name')||document.querySelector('[class*="company"]')||document.querySelector('h2')||{}).textContent||'';
      r.company=r.company.trim().substring(0,100);
      r.address=(document.querySelector('.job-address')||document.querySelector('[class*="address"]')||document.querySelector('[class*="loc"]')||{}).textContent||'';
      r.address=r.address.trim().substring(0,200);
      // 获取列表项
      var items=[];
      var ps=d.querySelectorAll('p');
      var lis=d.querySelectorAll('li');
      ps.forEach(function(p){var t=p.textContent.trim();if(t&&t.length>5&&t.length<300)items.push(t);});
      lis.forEach(function(li){var t=li.textContent.trim();if(t&&t.length>5&&t.length<300)items.push(t);});
      r.items=items.slice(0,50);
      return JSON.stringify(r);
    })()`;

    let data = {};
    try {
      const er = await send('Runtime.evaluate', { expression: js });
      data = JSON.parse(er.result && er.result.value || '{}');
    } catch (e) {
      console.error('提取数据失败:', e);
    }

    // 7. 分离职责和要求
    const items = data.items || [];
    const duties = [];
    const reqs = [];
    let inReq = false;
    for (const l of items) {
      const ll = l.toLowerCase();
      if ((ll.includes('要求') || ll.includes('任职') || ll.includes(' qualification')) && l.length < 80) {
        inReq = true;
        continue;
      }
      if (inReq) reqs.push(l);
      else duties.push(l);
    }

    // 8. 合并到 JOBS
    const job = JOBS[jobIdx];
    if (!job.duties && !job.desc) job.duties = (data.desc || '').substring(0, 800) || duties.join('\n');
    if (!job.requirements) job.requirements = reqs.join('\n');
    if (data.company && !job.company) job.company = data.company;
    if (data.address && !job.location) job.location = data.address;
    if (!job.hasDesc && (job.duties || job.requirements)) job.hasDesc = true;

    ST.results.push({ link: job.link, duties: job.duties, requirements: job.requirements });
    save();

    ws.close();
  } catch (e) {
    console.error('doCDP 错误:', e.message);
    throw e;
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function sleepFor(fn,ms){return new Promise(r=>{const iv=setInterval(()=>{if(!fn()||ST.stop){clearInterval(iv);r();}},ms);});}

function stopCrawl(){
  ST.stop=true;
  clearTimeout(PT);
  toast('停止爬取，进度已保存','if');
  setTimeout(onCrawlDone,500);
}

function onCrawlDone(){
  ST.running=false;
  document.getElementById('prog').classList.remove('on');
  document.getElementById('btnGo').disabled=false;
  document.getElementById('btnStop').disabled=true;
  render();updStats();
  setDot(ST.err>0?'error':'done',ST.err>0?'已完成(有错误)':'已完成');
  toast('爬取完成！已抓取 '+ST.cur+' 个详情页','ok');
}

function updProg(){
  const pct=ST.tot>0?(ST.cur/ST.tot*100).toFixed(1):0;
  const elap=Math.round((Date.now()-ST.start)/1000);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPro').textContent=ST.cur+'/'+ST.tot;
  document.getElementById('pJob').textContent=(JOBS[ST.todo[ST.cur]||0]||{}).name||'-';
  document.getElementById('pErr').textContent=ST.err;
  document.getElementById('pTime').textContent=elap+'s';
}

function dl(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

function fmtDate(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}

// ==================== 目录保存功能 ====================
let SAVE_DIR_HANDLE = null; // 保存目录句柄

async function selectDir(){
  try {
    // 使用 File System Access API 选择目录
    SAVE_DIR_HANDLE = await window.showDirectoryPicker({
      mode: 'readwrite'
    });
    toast('✅ 已选择保存目录: ' + SAVE_DIR_HANDLE.name, 'ok');
    // 保存到 localStorage
    localStorage.setItem('jd_hunter_saveDir', SAVE_DIR_HANDLE.name);
  } catch (e) {
    if (e.name !== 'AbortError') {
      toast('请使用 Chrome/Edge 浏览器', 'er');
    }
  }
}

async function saveToDir(filename, content){
  if (SAVE_DIR_HANDLE) {
    try {
      const fileHandle = await SAVE_DIR_HANDLE.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(content);
      await writable.close();
      toast('✅ 已保存到 ' + SAVE_DIR_HANDLE.name + '/' + filename, 'ok');
      return true;
    } catch (e) {
      console.error('保存失败:', e);
      toast('保存失败，改为下载', 'er');
    }
  }
  return false;
}

function save(){
  try{localStorage.setItem('jd_hunter_jobs',JSON.stringify(JOBS));}catch(e){}
}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function setDot(type,text){
  const dot=document.getElementById('dot');
  dot.className='status-dot '+(type==='idle'?'':(type==='crawl'?'crawl':type==='done'?'done':type==='error'?'error':'live'));
  document.getElementById('status').textContent=text;
}
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' sh';
  setTimeout(()=>t.classList.remove('sh'),3500);
}
